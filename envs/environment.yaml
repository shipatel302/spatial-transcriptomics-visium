name: spatial-tx
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip

  # Core scientific
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3

  # Spatial transcriptomics
  - scanpy>=1.9
  - squidpy>=1.3
  - anndata>=0.9

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12

  # Utilities
  - pyyaml>=6.0
  - tqdm
  - joblib

  - pip:
    - SpatialDE>=1.1.3
    - cell2location>=0.1.3
    - rpy2>=3.5         # R bridge for RCTD/STdeconvolve
